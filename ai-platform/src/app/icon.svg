<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metaict-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7e3ba6" />
      <stop offset="50%" stop-color="#df3a7a" />
      <stop offset="100%" stop-color="#eda344" />
    </linearGradient>
  </defs>

  <g fill="none" stroke="url(#metaict-grad)" stroke-width="8" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer Hexagon bounding the cube -->
    <polygon points="50,10 84.64,30 84.64,70 50,90 15.36,70 15.36,30" />
    
    <!-- Y-shaped inner lines connecting to the center -->
    <line x1="50" y1="50" x2="84.64" y2="30" />
    <line x1="50" y1="50" x2="50" y2="90" />
    <line x1="50" y1="50" x2="15.36" y2="30" />

    <!-- Nested top diamond -->
    <polygon points="50,20 67.32,30 50,40 32.68,30" />
    
    <!-- Nested right parallelogram -->
    <polygon points="75.98,45 75.98,65 58.66,75 58.66,55" />
    
    <!-- Nested left parallelogram -->
    <polygon points="24.02,45 41.34,55 41.34,75 24.02,65" />
  </g>
</svg>
